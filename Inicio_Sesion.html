<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Vitafit</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="Imagenes/Vitafit_logo.webp" type="Imagen/webp">
</head>

<body class="Body-login">

    <!-- LADO IZQUIERDO -->

    <section class="Contenedor-izquierda">
        <div class="Login">
            <div class="Logo">
                <a href="index.html">
                <img src="Imagenes/Vitafit_logo.webp" alt="Logo de Kinetic">
                </a>
            </div>

            <h1>Inicia sesión para continuar</h1>

            <form class="Formulario-datos">
                <div class="Introducir-datos">
                    <label for="email"><strong>Dirección de correo electrónico</strong></label>
                    <input type="email" required>
                </div>

                <div class="Introducir-datos">
                    <label for="password"><strong>Contraseña</strong></label>
                    <input type="password" required>
                </div>

                <button type="submit" class="Boton-login">Iniciar sesión</button>

                <a href="" class="Contraseña-olvidada"><strong>¿Has olvidado tu contraseña?</strong></a>
            </form>

            <div class="Login-social">
            <p><strong>Continua con</strong></p>

                <div class="Botones-social">
                <button type="button" class="Boton-social-facebook">Facebook
                <img src="Imagenes/Facebook.svg" alt="Facebook">
                </button>

                <button type="button" class="Boton-social-google">Google
                <img src="Imagenes/Google.svg" alt="Google">
                </button>
                </div>

            <div class="linea-con-texto">
                <span>O</span>
            </div>

                <a href="Registro.html" class="Link-registro">¿Eres nuevo? ¡Regístrate! </a>

            </div>
        </div>
    </section>


    <!-- LADO DERECHO -->

    <aside class="Contenedor-derecho-login"></aside>

</body>

</html>
