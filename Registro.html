<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | Vitafit</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="Imagenes/Vitafit_logo.webp" type="Imagen/webp">
</head>
<body class="Body-registro">

        <!-- LADO IZQUIERDO -->

        <section class="Contenedor-izquierda">
        <div class="Login">
            <div class="Logo2">
                <a href="index.html">
                <img src="Imagenes/Vitafit_logo.webp" alt="Logo de Kinetic">
                </a>
            </div>

            <div class="Login-social">
            <p><strong>Registrate con</strong></p>


                <div class="Botones-social">
                <button type="button" class="Boton-social-facebook">Facebook
                <img src="Imagenes/Facebook.svg" alt="Facebook">
                </button>

                <button type="button" class="Boton-social-google">Google
                <img src="Imagenes/Google.svg" alt="Google">
                </button>
                </div>

            <div class="linea-con-texto">
                <span>O</span>
            </div>


            <form class="Formulario-datos">
                <div class="Introducir-datos">
                    <label for="nombre"><strong>Nombre completo</strong></label>
                    <input type="text" required>
                </div>

                <div class="Introducir-datos">
                    <label for="email"><strong>Dirección de correo electrónico</strong></label>
                    <input type="email" required>
                </div>

                <div class="Introducir-datos">
                    <label for="password"><strong>Contraseña</strong></label>
                    <input type="password" required>
                </div>

                <div class="Introducir-datos">
                    <label for="password"><strong>Confirmar contraseña</strong></label>
                    <input type="password" required>
                </div>

                <div class="Introducir-datos">
                    <label for="telefono"><strong>Número de teléfono</strong></label>
                    <input type="tel" required>
                </div>


            <div class="Opciones-marketing">
                <div class="Opcion-marketing">
                    <input type="radio" id="marketing-si" name="consentimiento_marketing" value="si" checked>
                    <label for="marketing-si">Doy mi consentimiento para recibir actualizaciones de publicidad</label>
                </div>

                <div class="Opcion-marketing">
                    <input type="radio" id="marketing-no" name="consentimiento_marketing" value="no">
                    <label for="marketing-no">No doy mi consentimiento para recibir actualizaciones de publicidad</label>
                </div>
            </div>


                <button type="submit" class="Boton-login">Crear una cuenta</button>

                <a href="Inicio_Sesion.html" class="Contraseña-olvidada"><strong>¿Ya tienes una cuenta? Ingresa aquí</strong></a>
            </form>
        </section>

        <!-- LADO DERECHO -->

    <aside class="Contenedor-derecho-registro"></aside>
</body>

</html>
